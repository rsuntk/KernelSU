name: Build Manager Core

on:
  workflow_call:
    inputs:
        manager_type:
          description: 'Manager type'
          required: true
          type: string
          default: "normal"

jobs:
  build-manager-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./manager

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Randomize package name
        if: inputs.manager_type == 'spoofed'
        run: |
          echo "- Randomizing me.weishu.kernelsu ..."
          chmod +x spoofer; bash ./spoofer
          echo "- Done"

      - name: Setup need_upload
        id: need_upload
        run: |
          if [ ! -z "${{ secrets.BOT_TOKEN }}" ]; then
            echo "UPLOAD=true" >> $GITHUB_OUTPUT
          else
            echo "UPLOAD=false" >> $GITHUB_OUTPUT
          fi

      - name: Get artifact name
        id: getname
        run: |
          if [ "${{ inputs.manager_type }}" == "spoofed" ]; then
            echo "manager_artifact=manager-spoofed" >> $GITHUB_OUTPUT
            echo "ci_title=Manager (Spoofed)" >> $GITHUB_OUTPUT
          else
            echo "manager_artifact=manager" >> $GITHUB_OUTPUT
            echo "ci_title=Manager" >> $GITHUB_OUTPUT
          fi

      - name: Write key
        if: ${{ ( github.event_name != 'pull_request' ) || github.ref_type == 'tag' }}
        run: |
          if [ ! -z "${{ secrets.KEYSTORE }}" ]; then
            {
              echo KEYSTORE_PASSWORD='${{ secrets.KEYSTORE_PASSWORD }}'
              echo KEY_ALIAS='${{ secrets.KEY_ALIAS }}'
              echo KEY_PASSWORD='${{ secrets.KEY_PASSWORD }}'
              echo KEYSTORE_FILE='key.jks'
            } >> gradle.properties
            echo ${{ secrets.KEYSTORE }} | base64 -d > key.jks
          fi

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Download arm64 ksud
        uses: actions/download-artifact@v8
        with:
          name: ksud-aarch64-linux-android
          path: artifacts/ksud-aarch64-linux-android

      - name: Download arm ksud
        uses: actions/download-artifact@v8
        with:
          name: ksud-armv7-linux-androideabi
          path: artifacts/ksud-armv7-linux-androideabi

      - name: Copy ksud to app jniLibs
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          ARM64_KSUD=$(find ../artifacts/ksud-aarch64-linux-android -type f -name ksud | head -n 1)
          ARM_KSUD=$(find ../artifacts/ksud-armv7-linux-androideabi -type f -name ksud | head -n 1)
          test -n "$ARM64_KSUD"
          test -n "$ARM_KSUD"
          cp -f "$ARM64_KSUD" app/src/main/jniLibs/arm64-v8a/libksud.so
          cp -f "$ARM_KSUD" app/src/main/jniLibs/armeabi-v7a/libksud.so

      - name: Build with Gradle
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ./gradlew clean assembleRelease --stacktrace -PIS_PR_BUILD=true
          else
            ./gradlew clean assembleRelease --stacktrace
          fi

      - name: Upload build artifact
        if: ${{ ( github.event_name != 'pull_request' ) || github.ref_type == 'tag' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.getname.outputs.manager_artifact }}
          path: manager/app/build/outputs/apk/release/*.apk

      - name: Upload to telegram
        if: github.event_name != 'pull_request' && steps.need_upload.outputs.UPLOAD == 'true'
        env:
          CHAT_ID: ${{ secrets.CHAT_ID }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TITLE: ${{ steps.getname.outputs.ci_title }}
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ ! -z "${{ secrets.BOT_TOKEN }}" ]; then
            export VERSION=$(git rev-list --count HEAD)
            APK=$(find ./app/build/outputs/apk/release -name "*.apk")
            pip3 install telethon
            python3 $GITHUB_WORKSPACE/scripts/ksubot.py $APK
          fi
